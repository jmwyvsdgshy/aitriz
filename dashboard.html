<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-TRIZ 工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">
    <div id="app" class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800">系统使用概览</h2>
            <p class="text-gray-500 mt-2">欢迎使用 AI-TRIZ 创新引擎。所有数据均安全存储于您的本地浏览器中。</p>
        </div>

        <!-- 数据概览 -->
        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center hover:shadow-md transition-shadow">
                <div class="rounded-full bg-blue-50 p-4 mr-4">
                    <el-icon class="text-blue-600 text-2xl"><DocumentAdd /></el-icon>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">已分析问题</p>
                    <p class="text-2xl font-bold text-gray-800">{{ stats.problems }}</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center hover:shadow-md transition-shadow">
                <div class="rounded-full bg-green-50 p-4 mr-4">
                    <el-icon class="text-green-600 text-2xl"><CircleCheck /></el-icon>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">生成方案数</p>
                    <p class="text-2xl font-bold text-gray-800">{{ stats.solutions }}</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center hover:shadow-md transition-shadow">
                <div class="rounded-full bg-purple-50 p-4 mr-4">
                    <el-icon class="text-purple-600 text-2xl"><Lightning /></el-icon>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">API 调用次数</p>
                    <p class="text-2xl font-bold text-gray-800">{{ stats.apiCalls }}</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center hover:shadow-md transition-shadow">
                <div class="rounded-full bg-orange-50 p-4 mr-4">
                    <el-icon class="text-orange-600 text-2xl"><DataLine /></el-icon>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">系统状态</p>
                    <p class="text-xl font-bold text-green-600">离线就绪</p>
                </div>
            </div>
        </div>

        <!-- 图表与动态 -->
        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">TRIZ 理论应用分布 (演示)</h3>
                <div id="chart-triz" class="w-full h-[320px]"></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold text-gray-800">最新本地操作记录</h3>
                </div>
                <el-timeline v-if="history.length > 0">
                    <el-timeline-item v-for="(item, index) in history" :key="index" :timestamp="item.time" :type="item.type">
                        <el-card shadow="hover" class="!border-0 !shadow-sm bg-gray-50 !rounded-xl">
                            <h4 class="font-medium text-gray-800">{{ item.title }}</h4>
                            <p class="text-sm text-gray-500 mt-2">{{ item.desc }}</p>
                        </el-card>
                    </el-timeline-item>
                </el-timeline>
                <div v-else class="text-center text-gray-400 py-10">
                    暂无本地记录，请前往配置 API 并开始分析问题。
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    stats: {
                        problems: parseInt(localStorage.getItem('triz_stats_problems') || 0),
                        solutions: parseInt(localStorage.getItem('triz_stats_solutions') || 0),
                        apiCalls: parseInt(localStorage.getItem('triz_stats_apicalls') || 0)
                    },
                    history: JSON.parse(localStorage.getItem('triz_history') || '[]').slice(0, 3)
                }
            },
            mounted() {
                // 如果没有历史记录，填充一些引导性的占位数据
                if (this.history.length === 0) {
                    this.history = [
                        { time: new Date().toLocaleDateString(), type: 'primary', title: '系统初始化完成', desc: '欢迎使用基于 Vercel 部署的 AI-TRIZ。' },
                        { time: new Date().toLocaleDateString(), type: 'info', title: '等待配置 API', desc: '请前往 [系统配置] 页面填入您的 API Key。' }
                    ];
                }
                this.initChart();
            },
            methods: {
                initChart() {
                    const chart = echarts.init(document.getElementById('chart-triz'));
                    chart.setOption({
                        tooltip: { trigger: 'item' },
                        legend: { top: '5%', left: 'center' },
                        series: [
                            {
                                name: '使用占比',
                                type: 'pie',
                                radius: ['40%', '70%'],
                                avoidLabelOverlap: false,
                                itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                                label: { show: false, position: 'center' },
                                emphasis: {
                                    label: { show: true, fontSize: 20, fontWeight: 'bold' }
                                },
                                labelLine: { show: false },
                                data: [
                                    { value: 1048, name: '阿奇舒勒矛盾矩阵', itemStyle: { color: '#3b82f6' } },
                                    { value: 735, name: '40个发明原理', itemStyle: { color: '#10b981' } },
                                    { value: 580, name: '物场分析与76标准解', itemStyle: { color: '#8b5cf6' } },
                                    { value: 484, name: '技术进化法则', itemStyle: { color: '#f59e0b' } },
                                    { value: 300, name: '最终理想解(IFR)', itemStyle: { color: '#ef4444' } }
                                ]
                            }
                        ]
                    });
                    window.addEventListener('resize', () => chart.resize());
                }
            }
        });
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
