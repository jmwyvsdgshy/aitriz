<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业大模型配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden h-full">
    <div id="app" class="p-8 h-full flex flex-col max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8 shrink-0">
            <div class="flex items-center">
                <h2 class="text-2xl font-bold text-gray-800">系统配置</h2>
                <!-- <el-tag type="warning" class="ml-4" effect="light" round>企业版专用</el-tag> -->
            </div>
            <div class="flex space-x-3">
                <el-button plain icon="Upload" @click="triggerImport">导入配置</el-button>
                <el-button plain icon="Download" @click="exportConfig">导出配置</el-button>
                <input type="file" ref="fileInput" @change="importConfig" accept=".json" style="display: none;" />
            </div>
        </div>

        <main class="flex-1 overflow-y-auto pb-12">
            <div class="space-y-6">
                <el-alert
                    title="数据安全说明"
                    type="info"
                    description="系统支持接入私有化部署的大语言模型，您的创新项目数据（IFR、技术矛盾描述等）将通过加密通道传输至您配置的端点，平台不作任何留存。"
                    show-icon
                    class="!mb-2 !rounded-xl"
                ></el-alert>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center">
                        <div class="bg-blue-50 p-2 rounded-lg mr-3">
                            <el-icon class="text-blue-600"><Connection /></el-icon>
                        </div>
                        AI 引擎配置 (LLM API)
                    </h3>
                    
                    <el-form :model="form" label-width="160px" label-position="left">
                        <el-form-item label="服务提供商">
                            <el-select v-model="form.provider" class="w-full" placeholder="请选择服务商" size="large">
                                <el-option label="OpenAI (通用)" value="openai"></el-option>
                                <el-option label="Azure OpenAI (企业级)" value="azure"></el-option>
                                <el-option label="Anthropic Claude" value="anthropic"></el-option>
                                <el-option label="百度文心一言" value="baidu"></el-option>
                                <el-option label="阿里通义千问" value="aliyun"></el-option>
                                <el-option label="DeepSeek" value="deepseek"></el-option>
                                <el-option label="本地私有化部署 (如 Ollama)" value="local"></el-option>
                            </el-select>
                        </el-form-item>

                        <el-form-item label="Base URL (接口地址)">
                            <el-input v-model="form.baseUrl" placeholder="例如：https://api.openai.com/v1" size="large"></el-input>
                        </el-form-item>

                        <el-form-item label="API Key (密钥)">
                            <el-input v-model="form.apiKey" type="password" show-password placeholder="sk-..." size="large"></el-input>
                        </el-form-item>

                        <el-form-item label="模型名称 (Model)">
                            <el-input v-model="form.modelName" placeholder="例如：gpt-4-turbo, claude-3-opus, deepseek-chat" size="large"></el-input>
                        </el-form-item>

                        <el-divider border-style="dashed" class="!my-8"></el-divider>

                        <h4 class="font-bold text-gray-700 mb-4">TRIZ 专家角色 Prompt 调优</h4>
                        <el-form-item label="System Prompt">
                            <el-input 
                                v-model="form.prompt" 
                                type="textarea" 
                                :rows="8"
                                placeholder="定义 AI 的系统角色..."
                            ></el-input>
                            <div class="text-xs text-gray-400 mt-2 leading-tight">
                                默认提示词已内置了结构化问题分析与完整的 TRIZ 工具链知识库。
                            </div>
                        </el-form-item>

                        <el-form-item label="生成温度 (Temperature)">
                            <el-slider v-model="form.temperature" :max="2" :step="0.1" show-input></el-slider>
                            <div class="text-xs text-gray-400 w-full mt-1">值越低越严谨（适合严谨工程分析），值越高越发散（适合头脑风暴）。推荐值：0.4</div>
                        </el-form-item>

                        <el-form-item class="mt-10">
                            <el-button type="primary" size="large" @click="saveConfig" class="px-10 !rounded-xl" :loading="isSaving">
                                保存并测试连接
                            </el-button>
                            <el-button size="large" class="!rounded-xl ml-4">恢复默认</el-button>
                        </el-form-item>
                    </el-form>
                </div>

                <!-- 许可证信息 -->
                <!-- <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                    <div class="flex items-center"> -->
                        <!-- <div class="bg-green-50 p-3 rounded-full mr-4">
                            <el-icon class="text-green-600 text-xl"><Key /></el-icon>
                        </div> -->
                        <!-- <div>
                            <h4 class="font-bold text-gray-800 mb-1">商业授权信息</h4>
                            <p class="text-sm text-gray-500">当前版本：AI-TRIZ Enterprise v2.0 | 授权企业：未绑定</p>
                        </div>
                    </div>
                    <el-button type="success" plain round>更新 License</el-button> -->
                <!-- </div> -->
            </div>
        </main>
    </div>

    <script>
        const app = Vue.createApp({
            data() {
                // 初始化时从 localStorage 读取配置
                const savedConfig = JSON.parse(localStorage.getItem('triz_api_config') || '{}');
                return {
                    isSaving: false,
                    form: {
                        provider: savedConfig.provider || 'openai',
                        baseUrl: savedConfig.baseUrl || 'https://api.openai.com/v1',
                        apiKey: savedConfig.apiKey || '',
                        modelName: savedConfig.modelName || 'gpt-4o',
                        prompt: savedConfig.prompt || '你是一位顶级的 TRIZ（发明问题解决理论）专家。你的任务是：\n1. 引导用户输入问题背景，并进行结构化分析（包含系统功能、约束、工作原理、存在的问题及条件、现有解决方案缺点、新系统要求等）。\n2. 运用技术矛盾、物理矛盾、场分析、裁剪、进化法则、40个发明原理、阿奇舒勒矩阵、IFR等核心 TRIZ 工具生成解决方案。\n3. 最终输出包含序号、方案描述、所用创新原理及可用性评估的综合表格。',
                        temperature: savedConfig.temperature || 0.4
                    }
                }
            },
            methods: {
                async saveConfig() {
                    if (!this.form.apiKey) {
                        ElementPlus.ElMessage.error('API Key 不能为空');
                        return;
                    }
                    this.isSaving = true;
                    
                    try {
                        // 发送真实的测试请求，兼容 OpenAI API 格式
                        const response = await fetch(`${this.form.baseUrl}/chat/completions`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.form.apiKey}`
                            },
                            body: JSON.stringify({
                                model: this.form.modelName,
                                messages: [{ role: 'user', content: '测试连接，请回复"OK"' }],
                                max_tokens: 10
                            })
                        });

                        if (response.ok) {
                            // 保存配置到本地
                            localStorage.setItem('triz_api_config', JSON.stringify(this.form));
                            
                            // 记录历史
                            let history = JSON.parse(localStorage.getItem('triz_history') || '[]');
                            history.unshift({ time: new Date().toLocaleDateString(), type: 'success', title: 'API 配置成功', desc: `已连接到 ${this.form.provider} 模型 ${this.form.modelName}` });
                            localStorage.setItem('triz_history', JSON.stringify(history));

                            ElementPlus.ElMessage.success('连接成功，配置已保存在本地浏览器！');
                        } else {
                            const errData = await response.json().catch(() => ({}));
                            ElementPlus.ElMessage.error(`连接失败: ${response.status} ${errData.error?.message || ''}`);
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error(`网络请求失败，请检查 Base URL 是否正确或是否存在跨域问题：${error.message}`);
                    } finally {
                        this.isSaving = false;
                    }
                },
                exportConfig() {
                    const dataStr = JSON.stringify(this.form, null, 2);
                    const blob = new Blob([dataStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "triz_config.json";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    ElementPlus.ElMessage.success('配置已导出');
                },
                triggerImport() {
                    this.$refs.fileInput.click();
                },
                importConfig(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedConfig = JSON.parse(e.target.result);
                            
                            // 验证关键字段是否存在
                            if (importedConfig.hasOwnProperty('apiKey') && importedConfig.hasOwnProperty('baseUrl')) {
                                this.form = { ...this.form, ...importedConfig };
                                localStorage.setItem('triz_api_config', JSON.stringify(this.form));
                                ElementPlus.ElMessage.success('配置导入成功！请点击"保存并测试连接"以验证。');
                            } else {
                                ElementPlus.ElMessage.error('无效的配置文件格式');
                            }
                        } catch (err) {
                            ElementPlus.ElMessage.error('文件解析失败，请确保是合法的 JSON 文件');
                        }
                        // 重置 input，允许重复导入同一个文件
                        event.target.value = '';
                    };
                    reader.readAsText(file);
                }
            }
        });
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
